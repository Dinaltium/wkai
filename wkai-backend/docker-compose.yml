version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: wkai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: wkai
      POSTGRES_PASSWORD: wkai_password
      POSTGRES_DB: wkai
    ports:
      - "5432:5432"
    volumes:
      - wkai_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wkai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: wkai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - wkai_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  wkai_postgres_data:
  wkai_redis_data:
