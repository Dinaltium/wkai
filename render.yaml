services:
  - type: web
    name: wkai-backend
    runtime: node
    rootDir: wkai-backend
    plan: starter
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm run start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: STUDENT_JOIN_TOKEN_SECRET
        sync: false
