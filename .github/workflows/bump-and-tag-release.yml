name: Bump And Tag Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  RELEASE_BRANCH: release/main

jobs:
  bump-and-tag:
    if: github.actor != 'github-actions[bot]' && !contains(github.event.head_commit.message, '[skip release]')
    runs-on: ubuntu-latest
    outputs:
      committed: ${{ steps.commit.outputs.committed }}
      version: ${{ steps.version.outputs.value }}
      commit_sha: ${{ steps.meta.outputs.commit_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install
        working-directory: wkai

      - name: Resolve bump type
        id: bump
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.bump }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump app version
        run: node ./scripts/bump-version.mjs "${{ steps.bump.outputs.value }}"
        working-directory: wkai

      - name: Read bumped version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./wkai/package.json').version")
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit version files
        id: commit
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add wkai/package.json wkai/src-tauri/tauri.conf.json wkai/src-tauri/Cargo.toml
          if git diff --cached --quiet; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(release): bump app version to v${{ steps.version.outputs.value }} [skip release]"
          echo "committed=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.commit.outputs.committed == 'true'
        shell: bash
        run: |
          if git rev-parse "v${{ steps.version.outputs.value }}" >/dev/null 2>&1; then
            echo "Tag v${{ steps.version.outputs.value }} already exists, skipping."
            exit 0
          fi
          git tag "v${{ steps.version.outputs.value }}"
          git push origin HEAD:refs/heads/${RELEASE_BRANCH}
          git push origin "v${{ steps.version.outputs.value }}"

      - name: Capture commit metadata
        id: meta
        shell: bash
        run: |
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build-release:
    needs: bump-and-tag
    if: needs.bump-and-tag.outputs.committed == 'true'
    env:
      HAS_TAURI_SIGNING: ${{ secrets.TAURI_PRIVATE_KEY != '' && secrets.TAURI_KEY_PASSWORD != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb"
          - platform: macos-latest
            args: "--bundles app"

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.commit_sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            librsvg2-dev \
            patchelf

      - name: Install deps
        run: npm install
        working-directory: wkai

      - name: Build Tauri app (signed)
        if: env.HAS_TAURI_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: wkai
          args: ${{ matrix.args }}
          tagName: v${{ needs.bump-and-tag.outputs.version }}
          releaseName: WKAI v${{ needs.bump-and-tag.outputs.version }}
          releaseBody: "Automated WKAI desktop app release"
          releaseDraft: false
          prerelease: false

      - name: Build Tauri app (unsigned)
        if: env.HAS_TAURI_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: wkai
          args: ${{ matrix.args }}
          tagName: v${{ needs.bump-and-tag.outputs.version }}
          releaseName: WKAI v${{ needs.bump-and-tag.outputs.version }}
          releaseBody: "Automated WKAI desktop app release (unsigned)"
          releaseDraft: false
          prerelease: false
