name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    env:
      HAS_TAURI_SIGNING: ${{ secrets.TAURI_PRIVATE_KEY != '' && secrets.TAURI_KEY_PASSWORD != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ""
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb"
          - platform: macos-latest
            args: "--bundles dmg"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libasound2-dev \
            librsvg2-dev \
            patchelf

      - name: Install deps
        run: npm install
        working-directory: wkai

      - name: Build Tauri app (signed)
        if: env.HAS_TAURI_SIGNING == 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          projectPath: wkai
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: WKAI ${{ github.ref_name }}
          releaseBody: "Automated WKAI desktop app release"
          releaseDraft: false
          prerelease: false

      - name: Build Tauri app (unsigned)
        if: env.HAS_TAURI_SIGNING != 'true'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: wkai
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: WKAI ${{ github.ref_name }}
          releaseBody: "Automated WKAI desktop app release (unsigned)"
          releaseDraft: false
          prerelease: false